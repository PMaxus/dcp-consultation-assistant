<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowDb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0284c7"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1000" height="640" fill="#ffffff"/>

  <text x="500" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">DCP consultation &amp; pricing assistant — architecture</text>
  <text x="500" y="51" text-anchor="middle" font-size="12.5" fill="#64748b">Editable logic: catalog/rules in Sheets, prompts in DB, per-request memory — survives rule changes without a rebuild</text>

  <!-- Top flow -->
  <rect x="24" y="140" width="120" height="56" rx="10" fill="#faf5ff" stroke="#9333ea"/>
  <text x="84" y="164" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b21a8">Client</text>
  <text x="84" y="182" text-anchor="middle" font-size="11" fill="#7e22ce">Telegram</text>

  <rect x="172" y="140" width="120" height="56" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="232" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Telegram</text>
  <text x="232" y="181" text-anchor="middle" font-size="11" fill="#4338ca">Trigger</text>

  <rect x="320" y="140" width="162" height="56" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="401" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">Session key</text>
  <text x="401" y="181" text-anchor="middle" font-size="10.5" fill="#4338ca">SHA-256 → memory_key</text>

  <rect x="512" y="124" width="176" height="92" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8"/>
  <text x="600" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">AI Agent</text>
  <text x="600" y="171" text-anchor="middle" font-size="11" fill="#4338ca">consultation + price calc</text>
  <text x="600" y="188" text-anchor="middle" font-size="11" fill="#4338ca">structured output</text>

  <rect x="730" y="126" width="150" height="52" rx="10" fill="#faf5ff" stroke="#9333ea"/>
  <text x="805" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#6b21a8">Reply to client</text>
  <text x="805" y="165" text-anchor="middle" font-size="10.5" fill="#7e22ce">Telegram</text>

  <rect x="730" y="196" width="150" height="54" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="805" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Escalate to human</text>
  <text x="805" y="235" text-anchor="middle" font-size="10.5" fill="#b45309">manager (on uncertainty)</text>

  <!-- top-flow arrows -->
  <line x1="144" y1="168" x2="170" y2="168" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="292" y1="168" x2="318" y2="168" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="482" y1="168" x2="510" y2="168" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="688" y1="152" x2="728" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="688" y1="196" x2="728" y2="216" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Agent attachments (aligned: Memory above dcp_chat_history, Prompt above prompt_library) -->
  <rect x="155" y="300" width="150" height="60" rx="9" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="230" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">OpenRouter</text>
  <text x="230" y="341" text-anchor="middle" font-size="10.5" fill="#b45309">LLM</text>

  <rect x="335" y="300" width="150" height="60" rx="9" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="410" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#075985">Postgres Memory</text>
  <text x="410" y="337" text-anchor="middle" font-size="10" fill="#0369a1">per-request, depth ~90</text>
  <text x="410" y="351" text-anchor="middle" font-size="10" fill="#0369a1">keyed by memory_key</text>

  <rect x="515" y="300" width="180" height="60" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="605" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#0f766e">Tools</text>
  <text x="605" y="337" text-anchor="middle" font-size="10" fill="#0f766e">Google Sheets (catalog /</text>
  <text x="605" y="350" text-anchor="middle" font-size="10" fill="#0f766e">pricing / KB) · Postgres</text>

  <rect x="710" y="300" width="150" height="60" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="785" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">Prompt</text>
  <text x="785" y="341" text-anchor="middle" font-size="10" fill="#b45309">from prompt_library</text>

  <!-- agent -> attachments (plain connectors) -->
  <line x1="600" y1="216" x2="230" y2="300" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="600" y1="216" x2="410" y2="300" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="600" y1="216" x2="605" y2="300" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="600" y1="216" x2="785" y2="300" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- PostgreSQL backbone -->
  <rect x="120" y="468" width="820" height="150" rx="12" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="136" y="492" font-size="13" font-weight="700" fill="#075985">PostgreSQL backbone</text>
  <rect x="140" y="506" width="160" height="44" rx="8" fill="#ffffff" stroke="#0284c7"/>
  <text x="220" y="533" text-anchor="middle" font-size="11.5" fill="#075985">dcp_sessions</text>
  <rect x="320" y="506" width="180" height="44" rx="8" fill="#ffffff" stroke="#0284c7"/>
  <text x="410" y="533" text-anchor="middle" font-size="11.5" fill="#075985">dcp_chat_history</text>
  <rect x="520" y="506" width="160" height="44" rx="8" fill="#ffffff" stroke="#0284c7"/>
  <text x="600" y="533" text-anchor="middle" font-size="11.5" fill="#075985">issue_tracking</text>
  <rect x="700" y="506" width="170" height="44" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="785" y="524" text-anchor="middle" font-size="11.5" font-weight="600" fill="#b45309">prompt_library</text>
  <text x="785" y="539" text-anchor="middle" font-size="9" fill="#b45309">prompts as data (structure only)</text>

  <!-- short vertical dashed links only where a component sits above its table -->
  <line x1="410" y1="360" x2="410" y2="504" stroke="#0284c7" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrowDb)" marker-end="url(#arrowDb)"/>
  <line x1="785" y1="360" x2="785" y2="504" stroke="#0284c7" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrowDb)"/>
  <text x="416" y="440" text-anchor="start" font-size="10" fill="#0369a1">read / write</text>
  <!-- Session key <-> dcp_sessions: routed down the left margin, around the OpenRouter box -->
  <path d="M360,196 C210,232 138,275 138,335 L138,452 C138,482 168,504 206,506" fill="none" stroke="#0284c7" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrowDb)" marker-end="url(#arrowDb)"/>
  <!-- Escalate -> issue_tracking: routed through the gap between Tools and Prompt -->
  <path d="M748,250 C706,272 702,290 702,320 L702,360 C702,420 672,462 650,504" fill="none" stroke="#0284c7" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowDb)"/>

  <text x="136" y="582" font-size="11" fill="#0369a1">● escalation logs corrections into issue_tracking — a durable fix loop with history, not one-off prompt edits</text>
  <text x="136" y="600" font-size="11" fill="#0369a1">● reset of working context: on request · on agent confirmation · on inactivity timeout (logs kept)</text>

  <!-- Legend -->
  <rect x="120" y="624" width="12" height="12" rx="2" fill="#eef2ff" stroke="#6366f1"/>
  <text x="138" y="634" font-size="10.5" fill="#334155">n8n</text>
  <rect x="190" y="624" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="208" y="634" font-size="10.5" fill="#334155">LLM / human step / prompt</text>
  <rect x="370" y="624" width="12" height="12" rx="2" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="388" y="634" font-size="10.5" fill="#334155">tools (Sheets)</text>
  <rect x="500" y="624" width="12" height="12" rx="2" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="518" y="634" font-size="10.5" fill="#334155">PostgreSQL</text>
  <rect x="610" y="624" width="12" height="12" rx="2" fill="#faf5ff" stroke="#9333ea"/>
  <text x="628" y="634" font-size="10.5" fill="#334155">people / Telegram</text>
</svg>
